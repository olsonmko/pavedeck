<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pavedeck — Inventory</title>
<meta name="description" content="Pavedeck inventory merchandising">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="app.css">
</head>
<body>

<!-- ========================================================
     LOGIN SCREEN
     ======================================================== -->
<div class="auth-shell" id="auth-screen">
  <div class="auth-card">
    <a href="#" class="auth-brand">
      <svg class="mark" viewBox="0 0 28 28" aria-hidden="true">
        <rect x="2" y="14" width="18" height="11" rx="1.5" fill="none" stroke="#0C0A09" stroke-width="1.5"/>
        <rect x="5" y="11" width="18" height="11" rx="1.5" fill="none" stroke="#0C0A09" stroke-width="1.5"/>
        <rect x="8" y="8" width="18" height="11" rx="1.5" fill="#C2410C" stroke="#0C0A09" stroke-width="1.5"/>
      </svg>
      <span class="wordmark">Pavedeck</span>
    </a>

    <div class="auth-title">Sign in to your dealership</div>
    <div class="auth-sub">Enter your work email. We'll send you a magic link — no password to remember.</div>

    <form id="auth-form" onsubmit="return false;">
      <div class="auth-field">
        <label class="auth-label" for="auth-email">Work email</label>
        <input type="email" class="input" id="auth-email" placeholder="you@dealership.com" required>
      </div>
      <button class="auth-btn" type="submit" id="auth-submit">
        Send magic link
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
      </button>
    </form>

    <div class="auth-divider">or</div>

    <button class="auth-btn auth-btn-secondary" id="demo-btn">
      Continue as demo dealer
    </button>

    <div class="auth-foot">
      Don't have an account? <a href="../index.html">Start a free trial</a>
    </div>
  </div>
</div>

<!-- ========================================================
     APP SHELL
     ======================================================== -->
<div class="app-shell" id="app-shell">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <svg class="mark" viewBox="0 0 28 28" aria-hidden="true">
        <rect x="2" y="14" width="18" height="11" rx="1.5" fill="none" stroke="#0C0A09" stroke-width="1.5"/>
        <rect x="5" y="11" width="18" height="11" rx="1.5" fill="none" stroke="#0C0A09" stroke-width="1.5"/>
        <rect x="8" y="8" width="18" height="11" rx="1.5" fill="#C2410C" stroke="#0C0A09" stroke-width="1.5"/>
      </svg>
      <span class="wordmark">Pavedeck</span>
    </div>

    <div class="sidebar-section">Workspace</div>
    <button class="nav-item active" data-route="inventory">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Inventory
      <span class="nav-badge" id="needs-attn-badge">3</span>
    </button>
    <button class="nav-item" data-route="photos">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      Photos
    </button>
    <button class="nav-item" data-route="vdps">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      VDPs
    </button>
    <button class="nav-item" data-route="pricing">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
      Pricing
    </button>

    <div class="sidebar-section">Setup</div>
    <button class="nav-item" data-route="integrations">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
      Integrations
    </button>
    <button class="nav-item" data-route="settings">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      Settings
    </button>

    <div class="sidebar-foot">
      <div class="user-row">
        <div class="avatar" id="user-avatar">PM</div>
        <div class="user-info">
          <div class="user-name" id="user-name">Peninsula Motors</div>
          <div class="user-role" id="user-role">Demo dealer</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">

    <!-- TOP BAR -->
    <div class="topbar">
      <div class="topbar-left">
        <div class="crumb" id="crumb">
          <span class="crumb-current">Inventory</span>
        </div>
      </div>
      <div class="topbar-right">
        <div class="search-box">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" placeholder="Search VINs, vehicles..." id="search-input">
          <span class="kbd">⌘K</span>
        </div>
        <button class="icon-btn" title="Sign out" id="signout-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </div>

    <!-- PAGE CONTENT — rendered by JS -->
    <div id="page-root"></div>

  </div>
</div>

<!-- ADD VIN MODAL -->
<div class="modal-backdrop" id="add-modal">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title">Add a vehicle</div>
      <button class="modal-close" data-close-modal>&times;</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label class="field-label" for="add-vin">VIN (optional)</label>
        <input type="text" class="input" id="add-vin" placeholder="17-character VIN" maxlength="17">
      </div>
      <div class="field-row">
        <div class="field">
          <label class="field-label" for="add-year">Year</label>
          <input type="number" class="input" id="add-year" value="2022" min="2000" max="2026">
        </div>
        <div class="field">
          <label class="field-label" for="add-mileage">Mileage</label>
          <input type="number" class="input" id="add-mileage" value="35000">
        </div>
      </div>
      <div class="field">
        <label class="field-label" for="add-vehicle">Make / Model / Trim</label>
        <input type="text" class="input" id="add-vehicle" placeholder="e.g. Toyota Camry SE">
      </div>
      <div class="field-row">
        <div class="field">
          <label class="field-label" for="add-price">Asking price</label>
          <input type="number" class="input" id="add-price" value="25000">
        </div>
        <div class="field">
          <label class="field-label" for="add-days">Days on lot</label>
          <input type="number" class="input" id="add-days" value="0">
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" data-close-modal>Cancel</button>
      <button class="btn btn-primary" id="add-vin-submit">Add vehicle</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <div class="toast-dot"></div>
  <span id="toast-text">Saved</span>
</div>

<script src="app.js"></script>
</body>
</html>
